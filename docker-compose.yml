x-android-service: &android-service
  image: android-phone-api-dev:local
  build:
    context: .
    dockerfile: Dockerfile
  working_dir: /workspace
  volumes:
    - .:/workspace
    - gradle-cache:/home/android/.gradle
  environment:
    GRADLE_USER_HOME: /home/android/.gradle

services:
  android:
    <<: *android-service
    command: ["--version"]

  build:
    <<: *android-service
    command: ["assembleDebug"]

  lint:
    <<: *android-service
    command: ["lintDebug"]

  test:
    <<: *android-service
    command: ["testDebugUnitTest"]

  coverage:
    <<: *android-service
    command: ["testDebugUnitTest", "createDebugUnitTestCoverageReport"]

  shell:
    <<: *android-service
    entrypoint: ["/bin/bash"]
    command: []

volumes:
  gradle-cache:
