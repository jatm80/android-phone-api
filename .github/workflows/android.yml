name: Android

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  docker-build:
    name: Docker build, lint, test, coverage
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build development image
        run: docker compose build android

      - name: Run unit tests
        run: docker compose run --rm test

      - name: Run lint
        run: docker compose run --rm lint

      - name: Run coverage
        run: docker compose run --rm coverage

      - name: Build debug APK
        run: docker compose run --rm build
