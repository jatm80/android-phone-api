name: Android

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  docker-build:
    name: Docker build, lint, test, coverage
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set Docker UID/GID
        run: |
          echo "DOCKER_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "DOCKER_GID=$(id -g)" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build development image
        run: docker compose build android

      - name: Run unit tests
        run: docker compose run --rm test

      - name: Run lint
        run: docker compose run --rm lint

      - name: Run coverage report
        run: docker compose run --rm coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/build/reports/coverage/
          retention-days: 14

      - name: Build debug APK
        run: docker compose run --rm build

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/
          retention-days: 14
