name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build without publishing)'
        required: false
        default: 'false'
        type: boolean

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set Docker UID/GID
        run: |
          echo "DOCKER_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "DOCKER_GID=$(id -g)" >> "$GITHUB_ENV"

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${VERSION}"

      - name: Build development image
        run: docker compose build android

      - name: Run tests
        run: docker compose run --rm test

      - name: Build release APK
        run: docker compose run --rm android assembleRelease
        env:
          GRADLE_OPTS: "-Dorg.gradle.project.versionNameOverride=${{ steps.version.outputs.version }}"

      - name: Rename and generate checksums
        run: |
          cd app/build/outputs/apk/release/
          mv *.apk android-phone-api.apk
          sha256sum android-phone-api.apk > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/release/checksums-sha256.txt
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && github.event.inputs.dry_run != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/release/checksums-sha256.txt
          generate_release_notes: true
          draft: false
          prerelease: false
